<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Game Lexicon Pro - Thai Definition</title>
    <style>
        :root {
            --primary: #fbbf24;
            --secondary: #10b981;
            --card-bg: rgba(17, 24, 39, 0.98);
            --text: #f3f4f6;
        }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; background: transparent; 
            font-family: 'Segoe UI', 'Tahoma', 'Microsoft Sans Serif', sans-serif;
        }
        
        #bg-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; display: none; z-index: 1;
            filter: brightness(0.4);
        }

        .word-box {
            position: absolute;
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 3px;
            cursor: pointer; z-index: 5;
        }

        #control-panel {
            position: fixed; bottom: 30px; right: 30px;
            width: 380px; z-index: 1000;
            display: none;
            animation: slideInRight 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid #374151;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            margin-top: 12px;
        }

        #edit-input {
            width: 100%; padding: 12px;
            background: #0f172a; border: 2px solid #334155;
            border-radius: 10px; color: var(--primary); font-size: 1.2rem;
            box-sizing: border-box; outline: none;
        }

        .meaning-thai { font-size: 1.5rem; color: #fff; margin: 10px 0; font-weight: 600; }
        .desc-thai { font-size: 1rem; color: var(--primary); margin-bottom: 12px; line-height: 1.4; font-weight: 500; }
        .meaning-eng { font-size: 0.85rem; color: #9ca3af; border-top: 1px solid #374151; padding-top: 12px; font-style: italic; }

        #save-btn {
            background: linear-gradient(135deg, var(--secondary), #059669);
            color: white; border: none; padding: 12px; border-radius: 10px;
            width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="control-panel">
        <div class="glass-card">
            <div style="color: var(--primary); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px;">SCANNER INTERFACE</div>
            <input type="text" id="edit-input" placeholder="พิมพ์แก้ไขที่นี่...">
        </div>
        
        <div id="def-card" class="glass-card">
            <div id="card-thai" class="meaning-thai">เลือกคำที่ต้องการ...</div>
            <div id="card-desc-thai" class="desc-thai">คำอธิบายภาษาไทยจะโผล่ที่นี่</div>
            <div id="card-eng" class="meaning-eng">English definition loading...</div>
            <button id="save-btn" onclick="saveToLibrary()">เก็บเข้าคลังคำศัพท์</button>
        </div>
    </div>

    <img id="bg-img">
    <div id="word-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const bgImg = document.getElementById('bg-img');
        const wordContainer = document.getElementById('word-container');
        const controlPanel = document.getElementById('control-panel');
        const editInput = document.getElementById('edit-input');
        
        let typingTimer;
        let currentData = { word: '', translation: '', descriptionThai: '', definition: '' };

        ipcRenderer.on('cancel-scan', () => {
            resetUI();
        });

        function resetUI() {
            bgImg.style.display = 'none';
            wordContainer.innerHTML = '';
            controlPanel.style.display = 'none';
            ipcRenderer.send('set-ignore-mouse', true);
        }

        ipcRenderer.on('process-image', (event, paths) => {
            bgImg.src = `file://${paths.displayImg}?t=${Date.now()}`;
            bgImg.style.display = 'block';
            wordContainer.innerHTML = '';
            
            bgImg.onload = () => {
                const scaleX = bgImg.clientWidth / bgImg.naturalWidth;
                const scaleY = bgImg.clientHeight / bgImg.naturalHeight;
                const ocrScale = 5760 / bgImg.naturalWidth;

                Tesseract.recognize(paths.scanImg, 'eng').then(({ data: { words } }) => {
                    words.forEach(word => {
                        if (word.text.length < 2) return;
                        const { x0, y0, x1, y1 } = word.bbox;
                        const div = document.createElement('div');
                        div.className = 'word-box';
                        div.style.left = `${(x0 / ocrScale) * scaleX}px`;
                        div.style.top = `${(y0 / ocrScale) * scaleY}px`;
                        div.style.width = `${((x1 - x0) / ocrScale) * scaleX}px`;
                        div.style.height = `${((y1 - y0) / ocrScale) * scaleY}px`;

                        div.onclick = (e) => {
                            e.stopPropagation();
                            controlPanel.style.display = 'block';
                            editInput.value = word.text.replace(/[^a-zA-Z\s]/g, '').trim();
                            ipcRenderer.send('set-ignore-mouse', false);
                            editInput.focus();
                            triggerAutoTranslate(); 
                        };
                        wordContainer.appendChild(div);
                    });
                });
            };
        });

        editInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            document.getElementById('card-thai').innerText = "...";
            typingTimer = setTimeout(triggerAutoTranslate, 500); 
        });

        async function triggerAutoTranslate() {
            const word = editInput.value.trim();
            if (!word) return;
            
            try {
                // 1. แปลไทย + ดึงคำอธิบาย (MyMemory + Google ฐานข้อมูลร่วม)
                const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|th`);
                const tData = await tRes.json();
                
                // แยกคำแปลหลักกับคำอธิบาย (ถ้ามีหลายความหมาย)
                const matches = tData.matches || [];
                const mainThai = tData.responseData.translatedText;
                
                // หาคำอธิบายไทยเพิ่มเติมจาก Match อื่นๆ
                let descThai = "";
                if (matches.length > 1) {
                    descThai = matches.slice(1, 3).map(m => m.translation).join(', ');
                } else {
                    descThai = "ความหมายใกล้เคียง: " + mainThai;
                }

                // 2. นิยามอังกฤษ
                const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                let eng = "No English definition found.";
                if (dRes.ok) {
                    const dData = await dRes.json();
                    eng = dData[0].meanings[0].definitions[0].definition;
                }

                // แสดงผลบนการ์ด
                document.getElementById('card-thai').innerText = mainThai;
                document.getElementById('card-desc-thai').innerText = descThai;
                document.getElementById('card-eng').innerText = eng;
                
                currentData = { 
                    word, 
                    translation: mainThai, 
                    descriptionThai: descThai,
                    definition: eng 
                };
                
                document.getElementById('save-btn').innerText = "เก็บเข้าคลังคำศัพท์";
                document.getElementById('save-btn').disabled = false;
            } catch (e) {
                document.getElementById('card-thai').innerText = "API Error";
            }
        }

        function saveToLibrary() {
            ipcRenderer.send('save-vocabulary', currentData);
            document.getElementById('save-btn').innerText = "บันทึกแล้ว! ✅";
            document.getElementById('save-btn').disabled = true;
        }

        document.body.onclick = (e) => { if (e.target === bgImg) resetUI(); };
    </script>
</body>
</html>
